services:
  bot:
    image: darkinzen/codebook_bot:dev-v2
    command: python apply_bot.py
    restart: unless-stopped
    env_file:
      - .env

  fastapi:
    image: darkinzen/codebook_bot:dev-v2
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    depends_on:
      - bot
    env_file:
      - .env

  streamlit:
    image: darkinzen/codebook_bot:dev-v2
    command: streamlit run stream.py --server.port=8501 --server.address=0.0.0.0
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env

  caddy:
    image: caddy:latest
    container_name: caddy_reverse_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - fastapi
      - streamlit

volumes:
  caddy_data:
  caddy_config: